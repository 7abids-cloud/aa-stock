<!DOCTYPE html>
<html lang="ms" class="h-full bg-slate-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AA STOCK - Pengurusan Inventori Lebih Mudah, Cepat & Sistematik</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @media print {
            body { background: white !important; color: black !important; }
            .no-print { display: none !important; }
            .print-area { width: 100% !important; position: absolute; left: 0; top: 0; margin: 0; padding: 1.5cm !important; }
        }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { 50: '#f0f4f8', 100: '#dbe3f0', 200: '#bccbe2', 300: '#90abce', 400: '#5e85b5', 500: '#3e6398', 600: '#2f4d7b', 700: '#273e63', 800: '#1b2a47', 900: '#0f172a' }
                    }
                }
            }
        }
    </script>
</head>
<body class="h-full text-slate-800 antialiased flex flex-col">

    <div id="toast-container" class="fixed top-5 right-5 z-50 flex flex-col gap-3 max-w-sm w-full pointer-events-none"></div>

    <div id="confirm-modal" class="fixed inset-0 z-50 bg-slate-900/60 backdrop-blur-sm hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl max-w-md w-full shadow-2xl overflow-hidden transform scale-95 transition-all duration-300">
            <div class="p-6">
                <div class="w-12 h-12 rounded-full bg-amber-100 text-amber-600 flex items-center justify-center mb-4">
                    <i data-lucide="alert-triangle" class="w-6 h-6"></i>
                </div>
                <h3 id="confirm-title" class="text-lg font-bold text-slate-900">Pengesahan</h3>
                <p id="confirm-desc" class="text-sm text-slate-500 mt-2">Adakah anda pasti untuk meneruskan tindakan ini?</p>
            </div>
            <div class="bg-slate-50 px-6 py-4 flex justify-end gap-3">
                <button id="confirm-btn-cancel" class="px-4 py-2 bg-white border border-slate-200 text-slate-700 rounded-lg hover:bg-slate-50 transition font-medium text-sm">Batal</button>
                <button id="confirm-btn-confirm" class="px-4 py-2 bg-red-600 hover:bg-red-700 text-white rounded-lg transition font-medium text-sm">Ya, Teruskan</button>
            </div>
        </div>
    </div>

    <div id="app-root" class="flex flex-col md:flex-row h-full w-full overflow-hidden"></div>

    <script>
        const APP_ID = typeof __app_id !== 'undefined' ? __app_id : 'aa-stock-local';
        
        let state = {
            users: [], products: [], categories: [], suppliers: [], stockIn: [], stockOut: [], currentUser: null, activeView: 'dashboard'
        };

        // Load data from LocalStorage if available
        if(localStorage.getItem(APP_ID)) {
            try { state = JSON.parse(localStorage.getItem(APP_ID)); } catch(e) {}
        }

        function saveState() {
            localStorage.setItem(APP_ID, JSON.stringify(state));
        }

        function showToast(title, message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `p-4 rounded-xl shadow-lg border flex gap-3 transform translate-y-2 opacity-0 transition-all duration-300 pointer-events-auto bg-white`;
            let iconColor = 'text-emerald-500', iconName = 'check-circle', borderColor = 'border-emerald-100';
            if (type === 'error') { iconColor = 'text-rose-500'; iconName = 'x-circle'; borderColor = 'border-rose-100'; }
            toast.classList.add(borderColor);
            toast.innerHTML = `<div class="${iconColor} shrink-0"><i data-lucide="${iconName}" class="w-6 h-6"></i></div><div><h4 class="font-semibold text-slate-900 text-sm">${title}</h4><p class="text-slate-500 text-xs mt-0.5">${message}</p></div>`;
            container.appendChild(toast);
            lucide.createIcons();
            setTimeout(() => { toast.classList.remove('translate-y-2', 'opacity-0'); }, 50);
            setTimeout(() => { toast.classList.add('opacity-0', 'scale-95'); setTimeout(() => { toast.remove(); }, 300); }, 4000);
        }

        function needsSetup() { return state.users.length === 0; }

        function askConfirmation(title, description, onConfirm) {
            const modal = document.getElementById('confirm-modal');
            document.getElementById('confirm-title').textContent = title;
            document.getElementById('confirm-desc').textContent = description;
            modal.classList.remove('hidden');
            document.getElementById('confirm-btn-cancel').onclick = () => modal.classList.add('hidden');
            document.getElementById('confirm-btn-confirm').onclick = () => { modal.classList.add('hidden'); onConfirm(); };
        }

        function navigate(view) { state.activeView = view; renderApp(); }
        function logout() { askConfirmation('Log Keluar?', 'Anda akan ditamatkan sesi semasa.', () => { state.currentUser = null; saveState(); renderApp(); }); }

        function renderApp() {
            const root = document.getElementById('app-root');
            if (needsSetup()) { root.innerHTML = renderSetupWizard(); lucide.createIcons(); return; }
            if (!state.currentUser) { root.innerHTML = renderLoginScreen(); lucide.createIcons(); return; }

            root.innerHTML = `
                <div class="w-full md:w-64 bg-slate-900 text-slate-100 flex flex-col shrink-0 no-print border-r border-slate-800">
                    <div class="p-6 border-b border-slate-800 flex items-center justify-between">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-xl bg-blue-600 flex items-center justify-center font-bold text-white shadow-lg text-lg">AA</div>
                            <div>
                                <h1 class="font-extrabold tracking-tight text-white text-base">AA STOCK</h1>
                                <p class="text-[10px] text-slate-400 font-medium tracking-wide">PENGURUSAN INVENTORI</p>
                            </div>
                        </div>
                    </div>
                    <div class="flex-1 overflow-y-auto px-4 py-6 space-y-1">
                        <button onclick="navigate('dashboard')" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl transition font-medium text-sm text-left ${state.activeView === 'dashboard' ? 'bg-blue-600 text-white' : 'text-slate-300 hover:bg-slate-800'}"><i data-lucide="layout-dashboard" class="w-5 h-5"></i>Dashboard</button>
                        <div class="pt-4 pb-2 px-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Katalog</div>
                        <button onclick="navigate('products')" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl transition font-medium text-sm text-left ${state.activeView === 'products' ? 'bg-blue-600 text-white' : 'text-slate-300 hover:bg-slate-800'}"><i data-lucide="package" class="w-5 h-5"></i>Produk</button>
                        <button onclick="navigate('categories')" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl transition font-medium text-sm text-left ${state.activeView === 'categories' ? 'bg-blue-600 text-white' : 'text-slate-300 hover:bg-slate-800'}"><i data-lucide="tag" class="w-5 h-5"></i>Kategori</button>
                        <button onclick="navigate('suppliers')" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl transition font-medium text-sm text-left ${state.activeView === 'suppliers' ? 'bg-blue-600 text-white' : 'text-slate-300 hover:bg-slate-800'}"><i data-lucide="truck" class="w-5 h-5"></i>Pembekal</button>
                        <div class="pt-4 pb-2 px-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Transaksi</div>
                        <button onclick="navigate('stock-in')" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl transition font-medium text-sm text-left ${state.activeView === 'stock-in' ? 'bg-blue-600 text-white' : 'text-slate-300 hover:bg-slate-800'}"><i data-lucide="arrow-down-left" class="w-5 h-5 text-emerald-400"></i>Stok Masuk</button>
                        <button onclick="navigate('stock-out')" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl transition font-medium text-sm text-left ${state.activeView === 'stock-out' ? 'bg-blue-600 text-white' : 'text-slate-300 hover:bg-slate-800'}"><i data-lucide="arrow-up-right" class="w-5 h-5 text-rose-400"></i>Stok Keluar</button>
                        <div class="pt-4 pb-2 px-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Laporan</div>
                        <button onclick="navigate('reports')" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl transition font-medium text-sm text-left ${state.activeView === 'reports' ? 'bg-blue-600 text-white' : 'text-slate-300 hover:bg-slate-800'}"><i data-lucide="file-bar-chart" class="w-5 h-5"></i>Laporan</button>
                    </div>
                    <div class="p-4 border-t border-slate-800 bg-slate-950/40 flex items-center justify-between">
                        <div class="truncate">
                            <h4 class="text-xs font-semibold text-white">${state.currentUser.name}</h4>
                            <span class="text-[9px] font-bold bg-blue-500/10 text-blue-400 px-1.5 rounded uppercase">${state.currentUser.role}</span>
                        </div>
                        <button onclick="logout()" class="p-2 text-slate-400 hover:text-rose-400"><i data-lucide="log-out" class="w-4 h-4"></i></button>
                    </div>
                </div>
                <div class="flex-1 flex flex-col min-w-0 overflow-y-auto">
                    <header class="bg-white border-b border-slate-150 h-16 px-6 flex items-center justify-between no-print sticky top-0 z-30">
                        <h2 class="font-bold text-slate-800 text-lg">${getViewTitle(state.activeView)}</h2>
                        <button onclick="toggleNotificationPanel()" class="p-2 hover:bg-slate-100 rounded-xl relative">
                            <i data-lucide="bell" class="w-5 h-5"></i>
                            ${getLowStockCount() > 0 ? `<span class="absolute top-1 right-1 w-2 h-2 bg-rose-500 rounded-full animate-pulse"></span>` : ''}
                        </button>
                        <div id="notif-panel" class="absolute right-6 top-14 w-80 bg-white border rounded-xl shadow-xl hidden z-50 p-2">${renderLowStockAlerts()}</div>
                    </header>
                    <main class="flex-1 p-6 md:p-8">${renderActiveView()}</main>
                </div>
            `;
            lucide.createIcons();
            initChartsIfNeeded();
        }

        function getViewTitle(view) {
            const titles = { 'dashboard': 'Dashboard', 'products': 'Urus Produk', 'categories': 'Kategori', 'suppliers': 'Pembekal', 'stock-in': 'Stok Masuk', 'stock-out': 'Stok Keluar', 'reports': 'Pusat Laporan' };
            return titles[view] || 'AA STOCK';
        }
        function toggleNotificationPanel() { document.getElementById('notif-panel').classList.toggle('hidden'); }
        function getLowStockCount() { return state.products.filter(p => p.currentStock <= p.minStock).length; }
        function renderLowStockAlerts() {
            const low = state.products.filter(p => p.currentStock <= p.minStock);
            return low.length === 0 ? '<div class="text-xs p-2 text-slate-400">Tiada amaran stok.</div>' : low.map(p => `<div class="p-2 text-xs bg-amber-50 mb-1 rounded"><strong>${p.name}</strong>: ${p.currentStock} baki.</div>`).join('');
        }

        function renderSetupWizard() {
            return `<div class="min-h-screen w-full flex items-center justify-center bg-slate-900 p-4"><div class="bg-white p-8 rounded-2xl shadow-xl max-w-md w-full"><h2 class="text-xl font-bold mb-4">Setup Admin Pertama</h2><form onsubmit="handleWizardSubmit(event)" class="space-y-4"><div><label class="block text-xs font-bold mb-1">Nama Penuh</label><input type="text" id="setup-name" required class="w-full border p-2 rounded-xl text-sm"></div><div><label class="block text-xs font-bold mb-1">Username</label><input type="text" id="setup-username" required class="w-full border p-2 rounded-xl text-sm"></div><div><label class="block text-xs font-bold mb-1">Password</label><input type="password" id="setup-password" required class="w-full border p-2 rounded-xl text-sm"></div><button type="submit" class="w-full bg-blue-600 text-white p-2.5 rounded-xl font-bold">Mula Sistem</button></form></div></div>`;
        }

        function handleWizardSubmit(e) {
            e.preventDefault();
            state.users.push({ id: 'u1', name: document.getElementById('setup-name').value, username: document.getElementById('setup-username').value, password: document.getElementById('setup-password').value, role: 'Admin' });
            saveState(); showToast('Berjaya!', 'Akaun Admin dicipta.'); renderApp();
        }

        function renderLoginScreen() {
            return `<div class="min-h-screen w-full flex items-center justify-center bg-slate-900 p-4"><div class="bg-white p-8 rounded-2xl shadow-xl max-w-sm w-full text-center"><h2 class="text-2xl font-black mb-4">AA STOCK</h2><form onsubmit="handleLogin(event)" class="space-y-4 text-left"><div><label class="block text-xs font-bold mb-1">Username</label><input type="text" id="login-username" required class="w-full border p-2 rounded-xl text-sm"></div><div><label class="block text-xs font-bold mb-1">Password</label><input type="password" id="login-password" required class="w-full border p-2 rounded-xl text-sm"></div><button type="submit" class="w-full bg-blue-600 text-white p-2.5 rounded-xl font-bold">Log Masuk</button></form></div></div>`;
        }

        function handleLogin(e) {
            e.preventDefault();
            const u = document.getElementById('login-username').value, p = document.getElementById('login-password').value;
            const match = state.users.find(usr => usr.username === u && usr.password === p);
            if(match) { state.currentUser = match; saveState(); navigate('dashboard'); } else { showToast('Ralat', 'Username/Password salah', 'error'); }
        }

        function renderActiveView() {
            if(state.activeView === 'dashboard') return viewDashboard();
            if(state.activeView === 'products') return viewProducts();
            if(state.activeView === 'categories') return viewCategories();
            if(state.activeView === 'suppliers') return viewSuppliers();
            if(state.activeView === 'stock-in') return viewStockIn();
            if(state.activeView === 'stock-out') return viewStockOut();
            if(state.activeView === 'reports') return viewReports();
            return '<div>Muka surat tidak ditemui</div>';
        }

        function viewDashboard() {
            return `<div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6"><div class="bg-white p-4 border rounded-xl shadow-sm"><span class="text-xs text-slate-400 font-bold block">JUMLAH PRODUK</span><span class="text-xl font-bold">${state.products.length} SKU</span></div><div class="bg-white p-4 border rounded-xl shadow-sm"><span class="text-xs text-slate-400 font-bold block">BAKI STOK</span><span class="text-xl font-bold">${state.products.reduce((a,b)=>a+Number(b.currentStock),0)} Unit</span></div></div><div class="bg-white p-6 border rounded-xl shadow-sm h-64"><canvas id="stockTrendChart"></canvas></div>`;
        }

        function initChartsIfNeeded() {
            const canvas = document.getElementById('stockTrendChart'); if (!canvas) return;
            new Chart(canvas.getContext('2d'), { type: 'line', data: { labels: ['Jan','Feb','Mac','Apr','Mei','Jun'], datasets:[{label:'Stok', data:[0,0,0,0,0,state.products.reduce((a,b)=>a+Number(b.currentStock),0)], borderColor:'#10b981'}] }, options:{ responsive:true, maintainAspectRatio:false } });
        }

        function viewProducts() {
            return `<div class="mb-4 flex justify-between"><input type="text" placeholder="Cari..." class="border p-2 rounded-xl text-sm w-64"><button onclick="openProductModal()" class="bg-blue-600 text-white px-4 py-2 rounded-xl text-sm font-bold">+ Produk Baru</button></div><div class="bg-white border rounded-xl overflow-hidden"><table class="w-full text-left text-sm"><thead><tr class="bg-slate-50 border-b"><th class="p-3">SKU</th><th class="p-3">Nama</th><th class="p-3">Baki Semasa</th></tr></thead><tbody>${state.products.length===0?'<tr><td colspan="3" class="p-4 text-center text-slate-400">Tiada produk.</td></tr>':state.products.map(p=>`<tr class="border-b"><td class="p-3">${p.sku}</td><td class="p-3">${p.name}</td><td class="p-3 font-bold">${p.currentStock} ${p.unit}</td></tr>`).join('')}</tbody></table></div>
            <div id="product-modal" class="fixed inset-0 bg-slate-900/60 hidden flex items-center justify-center p-4"><div class="bg-white p-6 rounded-2xl max-w-md w-full"><h3 class="font-bold mb-4">Tambah Produk</h3><form onsubmit="saveProduct(event)" class="space-y-3"><div><label class="block text-xs font-bold mb-1">Nama *</label><input type="text" id="prod-name" required class="w-full border p-2 rounded-lg text-sm"></div><div><label class="block text-xs font-bold mb-1">SKU *</label><input type="text" id="prod-sku" required class="w-full border p-2 rounded-lg text-sm"></div><div><label class="block text-xs font-bold mb-1">Unit *</label><input type="text" id="prod-unit" required class="w-full border p-2 rounded-lg text-sm"></div><div class="flex justify-end gap-2"><button type="button" onclick="closeProductModal()" class="border px-4 py-2 rounded-lg text-sm">Batal</button><button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-bold">Simpan</button></div></form></div></div>`;
        }
        function openProductModal() { document.getElementById('product-modal').classList.remove('hidden'); }
        function closeProductModal() { document.getElementById('product-modal').classList.add('hidden'); }
        function saveProduct(e) {
            e.preventDefault();
            state.products.push({ id:'p_'+Date.now(), name: document.getElementById('prod-name').value, sku: document.getElementById('prod-sku').value, unit: document.getElementById('prod-unit').value, currentStock: 0, minStock: 5 });
            saveState(); closeProductModal(); navigate('products');
        }

        function viewCategories() { return `<div class="p-4 bg-white border rounded-xl">Modul Kategori Sedia Ada (Gunakan fitur tambah langsung pada rilis penuh).</div>`; }
        function viewSuppliers() { return `<div class="p-4 bg-white border rounded-xl">Modul Pembekal Sedia Ada.</div>`; }
        
        function viewStockIn() {
            return `<div class="grid grid-cols-1 md:grid-cols-3 gap-6"><div class="bg-white p-6 border rounded-2xl"><h3 class="font-bold mb-4 text-emerald-600">Perekodan Stok Masuk</h3><form onsubmit="handleStockIn(event)" class="space-y-3"><div><label class="block text-xs font-bold mb-1">Pilih Produk</label><select id="in-prod" class="w-full border p-2 rounded-lg text-sm bg-white">${state.products.map(p=>`<option value="${p.id}">${p.name}</option>`).join('')}</select></div><div><label class="block text-xs font-bold mb-1">Kuantiti</label><input type="number" id="in-qty" min="1" required class="w-full border p-2 rounded-lg text-sm"></div><button type="submit" class="w-full bg-emerald-600 text-white p-2 rounded-lg font-bold text-sm">Simpan Stok Masuk</button></form></div></div>`;
        }
        function handleStockIn(e) {
            e.preventDefault();
            const pid = document.getElementById('in-prod').value, qty = Number(document.getElementById('in-qty').value);
            const p = state.products.find(prod=>prod.id === pid);
            if(p) { p.currentStock += qty; saveState(); showToast('Berjaya', 'Stok berhasil ditambah'); navigate('dashboard'); }
        }

        function viewStockOut() {
            return `<div class="grid grid-cols-1 md:grid-cols-3 gap-6"><div class="bg-white p-6 border rounded-2xl"><h3 class="font-bold mb-4 text-rose-600">Perekodan Stok Keluar</h3><form onsubmit="handleStockOut(event)" class="space-y-3"><div><label class="block text-xs font-bold mb-1">Pilih Produk</label><select id="out-prod" class="w-full border p-2 rounded-lg text-sm bg-white">${state.products.map(p=>`<option value="${p.id}">${p.name} (Baki: ${p.currentStock})</option>`).join('')}</select></div><div><label class="block text-xs font-bold mb-1">Kuantiti</label><input type="number" id="out-grid-qty" min="1" required class="w-full border p-2 rounded-lg text-sm"></div><button type="submit" class="w-full bg-rose-600 text-white p-2 rounded-lg font-bold text-sm">Simpan Stok Keluar</button></form></div></div>`;
        }
        function handleStockOut(e) {
            e.preventDefault();
            const pid = document.getElementById('out-prod').value, qty = Number(document.getElementById('out-grid-qty').value);
            const p = state.products.find(prod=>prod.id === pid);
            if(p) { if(p.currentStock < qty) { showToast('Ralat', 'Stok tidak cukup', 'error'); return; } p.currentStock -= qty; saveState(); showToast('Berjaya', 'Stok dikeluarkan'); navigate('dashboard'); }
        }

        function viewReports() { return `<div class="bg-white p-6 border rounded-xl"><h4 class="font-bold mb-2">Laporan Baki Stok Semasa</h4><table class="w-full text-left text-sm"><thead><tr class="bg-slate-50"><th class="p-2">Produk</th><th class="p-2 text-right">Baki</th></tr></thead><tbody>${state.products.map(p=>`<tr class="border-b"><td class="p-2">${p.name}</td><td class="p-2 text-right font-bold">${p.currentStock}</td></tr>`).join('')}</tbody></table></div>`; }

        renderApp();
    </script>
</body>
</html>
