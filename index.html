<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AA STOCK - System Management</title>
    <!-- Tailwind CSS untuk Tampilan Modern & Clean -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen pb-12">

    <!-- TOP BAR & SETTINGS -->
    <header class="bg-white border-b border-slate-200 sticky top-0 z-50 shadow-xs">
        <div class="max-w-7xl mx-auto px-4 py-4 flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="bg-indigo-600 text-white p-2.5 rounded-xl font-bold text-xl tracking-wider shadow-md shadow-indigo-100">AA</div>
                <div>
                    <h1 class="text-xl font-bold tracking-tight text-slate-900" id="txt-app-title">AA STOCK</h1>
                    <p class="text-xs text-slate-500 font-medium" id="txt-app-subtitle">Sistem Pengurusan Stok & Inventori</p>
                </div>
            </div>
            
            <!-- Pengaturan Bahasa & Mata Uang -->
            <div class="flex flex-wrap items-center gap-3 bg-slate-100 p-1.5 rounded-xl border border-slate-200">
                <!-- Dropdown Bahasa -->
                <div class="flex items-center gap-1.5 px-2">
                    <span class="text-xs font-semibold text-slate-500 uppercase tracking-wider" id="lbl-lang">Lang:</span>
                    <select id="select-lang" onchange="changeLanguage(this.value)" class="bg-white text-sm font-semibold text-slate-700 py-1 px-2.5 rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 cursor-pointer">
                        <option value="ms">Bahasa Malaysia</option>
                        <option value="id">Bahasa Indonesia</option>
                        <option value="en">English</option>
                        <option value="ja">日本語</option>
                        <option value="ar">العربية</option>
                    </select>
                </div>
                <div class="h-5 w-px bg-slate-300 hidden sm:block"></div>
                <!-- Dropdown Mata Uang -->
                <div class="flex items-center gap-1.5 px-2">
                    <span class="text-xs font-semibold text-slate-500 uppercase tracking-wider" id="lbl-curr">Curr:</span>
                    <select id="select-curr" onchange="changeCurrency(this.value)" class="bg-white text-sm font-semibold text-slate-700 py-1 px-2.5 rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 cursor-pointer">
                        <option value="MYR">MYR (RM)</option>
                        <option value="IDR">IDR (Rp)</option>
                        <option value="USD">USD ($)</option>
                        <option value="JPY">JPY (¥)</option>
                        <option value="SGD">SGD (S$)</option>
                    </select>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 mt-8 grid grid-cols-1 lg:grid-cols-3 gap-8">
        <!-- FORM INPUT BARANG -->
        <section class="bg-white border border-slate-200 rounded-2xl p-6 shadow-xs h-fit">
            <h2 class="text-lg font-bold text-slate-900 mb-5 flex items-center gap-2" id="title-add-item">
                <span class="w-2 h-5 bg-indigo-600 rounded-full inline-block"></span> Tambah Item Baru
            </h2>
            <form id="stock-form" onsubmit="addItem(event)" class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1.5" id="lbl-item-name">Nama Item</label>
                    <input type="text" id="input-name" required placeholder="Contoh: Ramen Segera" class="w-full text-sm bg-slate-50 border border-slate-200 rounded-xl px-3.5 py-2.5 focus:outline-none focus:bg-white focus:ring-2 focus:ring-indigo-500 transition">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1.5" id="lbl-item-stock">Kuantiti Stok</label>
                        <input type="number" id="input-stock" min="0" required placeholder="0" class="w-full text-sm bg-slate-50 border border-slate-200 rounded-xl px-3.5 py-2.5 focus:outline-none focus:bg-white focus:ring-2 focus:ring-indigo-500 transition">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1.5" id="lbl-item-min-stock">Min. Stok Alert</label>
                        <input type="number" id="input-min-stock" min="0" value="5" class="w-full text-sm bg-slate-50 border border-slate-200 rounded-xl px-3.5 py-2.5 focus:outline-none focus:bg-white focus:ring-2 focus:ring-indigo-500 transition">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1.5" id="lbl-item-cost">Harga Kos (<span class="currency-label">RM</span>)</label>
                    <input type="number" id="input-cost" min="0" step="0.01" required placeholder="0.00" class="w-full text-sm bg-slate-50 border border-slate-200 rounded-xl px-3.5 py-2.5 focus:outline-none focus:bg-white focus:ring-2 focus:ring-indigo-500 transition">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1.5" id="lbl-item-price">Harga Jual (<span class="currency-label">RM</span>)</label>
                    <input type="number" id="input-price" min="0" step="0.01" required placeholder="0.00" class="w-full text-sm bg-slate-50 border border-slate-200 rounded-xl px-3.5 py-2.5 focus:outline-none focus:bg-white focus:ring-2 focus:ring-indigo-500 transition">
                </div>
                <button type="submit" id="btn-submit" class="w-full mt-2 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold text-sm py-3 px-4 rounded-xl shadow-md shadow-indigo-100 transition duration-150 cursor-pointer">Simpan Item</button>
            </form>
        </section>

        <!-- DASHBOARD & TABEL STOK -->
        <section class="lg:grid-cols-1 lg:col-span-2 space-y-6">
            <!-- Ringkasan Statistik -->
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                <div class="bg-white border border-slate-200 rounded-2xl p-5 shadow-xs">
                    <p class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1" id="stat-total-items">Jumlah Produk</p>
                    <p id="total-items-val" class="text-2xl font-bold text-slate-900">0</p>
                </div>
                <div class="bg-white border border-slate-200 rounded-2xl p-5 shadow-xs">
                    <p class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1" id="stat-total-stock">Total Kuantiti</p>
                    <p id="total-stock-val" class="text-2xl font-bold text-slate-900">0</p>
                </div>
                <div class="bg-white border border-slate-200 rounded-2xl p-5 shadow-xs sm:col-span-2 lg:col-span-1">
                    <p class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1" id="stat-total-asset">Jumlah Nilai Aset</p>
                    <p id="total-asset-val" class="text-2xl font-bold text-indigo-600">RM 0.00</p>
                </div>
            </div>

            <!-- Tabel Data -->
            <div class="bg-white border border-slate-200 rounded-2xl shadow-xs overflow-hidden">
                <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                    <h3 class="font-bold text-slate-900" id="title-inventory">Senarai Inventori</h3>
                    <span class="text-xs font-medium px-2.5 py-1 bg-indigo-50 text-indigo-600 rounded-full border border-indigo-100" id="badge-live">Live Data</span>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="border-b border-slate-200 text-slate-500 text-xs font-bold uppercase tracking-wider bg-slate-50/70">
                                <th class="py-3 px-6" id="th-name">Nama Item</th>
                                <th class="py-3 px-6 text-center" id="th-stock">Stok</th>
                                <th class="py-3 px-6 text-right" id="th-cost">Kos</th>
                                <th class="py-3 px-6 text-right" id="th-price">Jual</th>
                                <th class="py-3 px-6 text-right" id="th-total">Total Kos</th>
                                <th class="py-3 px-6 text-center" id="th-action">Tindakan</th>
                            </tr>
                        </thead>
                        <tbody id="inventory-tbody" class="divide-y divide-slate-100 text-sm font-medium text-slate-700">
                            <!-- Data dimuatkan lewat Javascript -->
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <!-- DATA & LOGIK JAVASCRIPT -->
    <script>
        // Database Lokalisasi (5 Bahasa Internasional)
        const i18n = {
            ms: {
                appTitle: "AA STOCK", appSubtitle: "Sistem Pengurusan Stok & Inventori",
                lblLang: "Bahasa:", lblCurr: "Mata Wang:", titleAddItem: "Tambah Item Baru",
                lblItemName: "Nama Item", lblItemStock: "Kuantiti Stok", lblItemMinStock: "Min. Stok Alert",
                lblItemCost: "Harga Kos", lblItemPrice: "Harga Jual", btnSubmit: "Simpan Item",
                statTotalItems: "Jumlah Produk", statTotalStock: "Total Kuantiti", statTotalAsset: "Jumlah Nilai Aset",
                titleInventory: "Senarai Inventori", badgeLive: "Data Langsung",
                thName: "Nama Item", thStock: "Stok", thCost: "Kos", thPrice: "Jual", thTotal: "Total Kos", thAction: "Tindakan",
                btnDelete: "Padam", alertLowStock: "Stok Rendah!"
            },
            id: {
                appTitle: "AA STOCK", appSubtitle: "Sistem Manajemen Stok & Inventori",
                lblLang: "Bahasa:", lblCurr: "Mata Uang:", titleAddItem: "Tambah Item Baru",
                lblItemName: "Nama Item", lblItemStock: "Jumlah Stok", lblItemMinStock: "Min. Stok Alert",
                lblItemCost: "Harga Modal", lblItemPrice: "Harga Jual", btnSubmit: "Simpan Item",
                statTotalItems: "Jumlah Produk", statTotalStock: "Total Kuantiti", statTotalAsset: "Total Nilai Aset",
                titleInventory: "Daftar Inventori", badgeLive: "Data Langsung",
                thName: "Nama Item", thStock: "Stok", thCost: "Modal", thPrice: "Jual", thTotal: "Total Modal", thAction: "Aksi",
                btnDelete: "Hapus", alertLowStock: "Stok Menipis!"
            },
            en: {
                appTitle: "AA STOCK", appSubtitle: "Stock & Inventory Management System",
                lblLang: "Language:", lblCurr: "Currency:", titleAddItem: "Add New Item",
                lblItemName: "Item Name", lblItemStock: "Stock Quantity", lblItemMinStock: "Min. Stock Alert",
                lblItemCost: "Cost Price", lblItemPrice: "Selling Price", btnSubmit: "Save Item",
                statTotalItems: "Total Products", statTotalStock: "Total Quantity", statTotalAsset: "Total Asset Value",
                titleInventory: "Inventory List", badgeLive: "Live Data",
                thName: "Item Name", thStock: "Stock", thCost: "Cost", thPrice: "Sell", thTotal: "Total Cost", thAction: "Action",
                btnDelete: "Delete", alertLowStock: "Low Stock!"
            },
            ja: {
                appTitle: "AA STOCK", appSubtitle: "在庫・商品管理システム",
                lblLang: "言語:", lblCurr: "通貨:", titleAddItem: "新規アイテム追加",
                lblItemName: "商品名", lblItemStock: "在庫数", lblItemMinStock: "最低在庫アラート",
                lblItemCost: "原価 (コスト)", lblItemPrice: "販売価格", btnSubmit: "アイテムを保存",
                statTotalItems: "総商品数", statTotalStock: "総在庫数量", statTotalAsset: "総資産価値",
                titleInventory: "在庫一覧", badgeLive: "ライブデータ",
                thName: "商品名", thStock: "在庫", thCost: "原価", thPrice: "売価", thTotal: "総原価", thAction: "操作",
                btnDelete: "削除", alertLowStock: "在庫僅少!"
            },
            ar: {
                appTitle: "AA STOCK", appSubtitle: "نظام إدارة المخزون والمستودعات",
                lblLang: "اللغة:", lblCurr: "العملة:", titleAddItem: "إضافة مادة جديدة",
                lblItemName: "اسم المادة", lblItemStock: "كمية المخزون", lblItemMinStock: "تنبيه الحد الأدنى",
                lblItemCost: "سعر التكلفة", lblItemPrice: "سعر البيع", btnSubmit: "حفظ المادة",
                statTotalItems: "إجمالي المنتجات", statTotalStock: "إجمالي الكمية", statTotalAsset: "إجمالي قيمة الأصول",
                titleInventory: "قائمة المخزون", badgeLive: "البيانات الحية",
                thName: "اسم المادة", thStock: "المخزون", thCost: "التكلفة", thPrice: "البيع", thTotal: "إجمالي التكلفة", thAction: "الإجراء",
                btnDelete: "حذف", alertLowStock: "المخزون منخفض!"
            }
        };

        // Konfigurasi Format Mata Uang (Simbol & Locale)
        const currencyConfig = {
            MYR: { symbol: 'RM', locale: 'en-MY' },
            IDR: { symbol: 'Rp', locale: 'id-ID' },
            USD: { symbol: '$', locale: 'en-US' },
            JPY: { symbol: '¥', locale: 'ja-JP' },
            SGD: { symbol: 'S$', locale: 'en-SG' }
        };

        // Status Pengaturan Default (Utama: Malaysia & MYR)
        let currentLang = 'ms';
        let currentCurr = 'MYR';

        // Mock Data / Data Dummy Awal
        let inventory = [
            { id: 1, name: "Ramen Segera", stock: 25, minStock: 5, cost: 3.50, price: 5.50 },
            { id: 2, name: "Teh Hijau Kotak", stock: 3, minStock: 8, cost: 1.80, price: 3.00 }
        ];

        // Fungsi Format Angka Mata Uang Dinamis
        function formatMoney(value) {
            const cfg = currencyConfig[currentCurr];
            if (currentCurr === 'IDR' || currentCurr === 'JPY') {
                return cfg.symbol + ' ' + Math.round(value).toLocaleString(cfg.locale);
            }
            return cfg.symbol + ' ' + value.toFixed(2).toLocaleString(cfg.locale);
        }

        // Fungsi Ubah Bahasa
        function changeLanguage(langCode) {
            currentLang = langCode;
            const t = i18n[langCode];
            
            // Ubah Teks UI
            document.getElementById('txt-app-title').innerText = t.appTitle;
            document.getElementById('txt-app-subtitle').innerText = t.appSubtitle;
            document.getElementById('lbl-lang').innerText = t.lblLang;
            document.getElementById('lbl-curr').innerText = t.lblCurr;
            document.getElementById('title-add-item').innerHTML = `<span class="w-2 h-5 bg-indigo-600 rounded-full inline-block"></span> ${t.titleAddItem}`;
            document.getElementById('lbl-item-name').innerText = t.lblItemName;
            document.getElementById('lbl-item-stock').innerText = t.lblItemStock;
            document.getElementById('lbl-item-min-stock').innerText = t.lblItemMinStock;
            document.getElementById('lbl-item-cost').innerHTML = `${t.lblItemCost} (<span class="currency-label">${currencyConfig[currentCurr].symbol}</span>)`;
            document.getElementById('lbl-item-price').innerHTML = `${t.lblItemPrice} (<span class="currency-label">${currencyConfig[currentCurr].symbol}</span>)`;
            document.getElementById('btn-submit').innerText = t.btnSubmit;
            
            document.getElementById('stat-total-items').innerText = t.statTotalItems;
            document.getElementById('stat-total-stock').innerText = t.statTotalStock;
            document.getElementById('stat-total-asset').innerText = t.statTotalAsset;
            
            document.getElementById('title-inventory').innerText = t.titleInventory;
            document.getElementById('badge-live').innerText = t.badgeLive;
            
            document.getElementById('th-name').innerText = t.thName;
            document.getElementById('th-stock').innerText = t.thStock;
            document.getElementById('th-cost').innerText = t.thCost;
            document.getElementById('th-price').innerText = t.thPrice;
            document.getElementById('th-total').innerText = t.thTotal;
            document.getElementById('th-action').innerText = t.thAction;

            renderTable();
        }

        // Fungsi Ubah Mata Uang
        function changeCurrency(currCode) {
            currentCurr = currCode;
            const symbol = currencyConfig[currCode].symbol;
            
            // Ubah simbol mata uang di label form input
            const labels = document.querySelectorAll('.currency-label');
            labels.forEach(el => el.innerText = symbol);
            
            renderTable();
        }

        // Fungsi Hitung Statistik Dashboard
        function updateDashboard() {
            let totalItems = inventory.length;
            let totalStock = inventory.reduce((sum, item) => sum + item.stock, 0);
            let totalAsset = inventory.reduce((sum, item) => sum + (item.stock * item.cost), 0);

            document.getElementById('total-items-val').innerText = totalItems;
            document.getElementById('total-stock-val').innerText = totalStock;
            document.getElementById('total-asset-val').innerText = formatMoney(totalAsset);
        }

        // Fungsi Memuat/Render Tabel Data
        function renderTable() {
            const tbody = document.getElementById('inventory-tbody');
            tbody.innerHTML = '';
            const t = i18n[currentLang];

            inventory.forEach(item => {
                const isLowStock = item.stock <= item.minStock;
                const totalCost = item.stock * item.cost;

                const tr = document.createElement('tr');
                tr.className = `hover:bg-slate-50/80 transition duration-150 ${isLowStock ? 'bg-rose-50/40 hover:bg-rose-50/70' : ''}`;
                
                tr.innerHTML = `
                    <td class="py-4 px-6 font-semibold text-slate-900">
                        ${item.name}
                        ${isLowStock ? `<span class="block text-[10px] text-rose-600 font-bold mt-0.5 uppercase tracking-wide">⚠️ ${t.alertLowStock}</span>` : ''}
                    </td>
                    <td class="py-4 px-6 text-center ${isLowStock ? 'text-rose-600 font-bold' : 'text-slate-600'}">${item.stock}</td>
                    <td class="py-4 px-6 text-right text-slate-600">${formatMoney(item.cost)}</td>
                    <td class="py-4 px-6 text-right text-slate-600">${formatMoney(item.price)}</td>
                    <td class="py-4 px-6 text-right font-semibold text-slate-900">${formatMoney(totalCost)}</td>
                    <td class="py-4 px-6 text-center">
                        <button onclick="deleteItem(${item.id})" class="text-xs bg-rose-50 hover:bg-rose-100 text-rose-600 font-bold py-1.5 px-3 rounded-lg border border-rose-100 hover:border-rose-200 transition cursor-pointer">
                            ${t.btnDelete}
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });

            updateDashboard();
        }

        // Fungsi Aksi Tambah Item
        function addItem(event) {
            event.preventDefault();
            
            const name = document.getElementById('input-name').value;
            const stock = parseInt(document.getElementById('input-stock').value);
            const minStock = parseInt(document.getElementById('input-min-stock').value);
            const cost = parseFloat(document.getElementById('input-cost').value);
            const price = parseFloat(document.getElementById('input-price').value);

            const newItem = {
                id: Date.now(),
                name, stock, minStock, cost, price
            };

            inventory.push(newItem);
            renderTable();
            
            document.getElementById('stock-form').reset();
            document.getElementById('input-min-stock').value = 5;
        }

        // Fungsi Aksi Hapus Item
        function deleteItem(id) {
            inventory = inventory.filter(item => item.id !== id);
            renderTable();
        }

        renderTable();
    </script>
</body>
</html>
