<!DOCTYPE html>
<html lang="ms" class="h-full bg-slate-950">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AA STOCK TITAN - Ultra Cloud Ecosystem</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .glass-card { background: rgba(15, 23, 42, 0.65); backdrop-filter: blur(16px); border: 1px border; border-color: rgba(51, 65, 85, 0.5); }
        .animate-fade { animation: fadeIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        @media print { .no-print { display: none !important; } .print-area { width: 100% !important; background: white !important; color: black !important; padding: 1cm !important; } }
    </style>
</head>
<body class="h-full text-slate-100 antialiased bg-slate-950 flex flex-col">

    <div id="toast-container" class="fixed top-5 right-5 z-50 flex flex-col gap-3 max-w-sm w-full pointer-events-none"></div>

    <!-- Confirmation Modal -->
    <div id="confirm-modal" class="fixed inset-0 z-50 bg-slate-950/80 backdrop-blur-sm hidden flex items-center justify-center p-4">
        <div class="glass-card rounded-3xl max-w-md w-full p-6 animate-fade text-center">
            <div class="w-12 h-12 rounded-2xl bg-rose-500/10 text-rose-400 flex items-center justify-center mx-auto mb-4"><i data-lucide="alert-triangle"></i></div>
            <h3 id="confirm-title" class="text-base font-bold text-white"></h3>
            <p id="confirm-desc" class="text-xs text-slate-400 mt-2"></p>
            <div class="mt-6 flex justify-center gap-3">
                <button id="confirm-btn-cancel" class="px-4 py-2 bg-slate-800 text-slate-300 rounded-xl font-semibold text-xs">Batal</button>
                <button id="confirm-btn-confirm" class="px-5 py-2 bg-rose-600 text-white rounded-xl font-semibold text-xs shadow-lg shadow-rose-600/30">Hapus Data</button>
            </div>
        </div>
    </div>

    <!-- Barcode Scanner Modal -->
    <div id="scanner-modal" class="fixed inset-0 z-50 bg-slate-950/80 backdrop-blur-sm hidden flex items-center justify-center p-4">
        <div class="glass-card rounded-3xl max-w-md w-full p-6 animate-fade">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xs font-bold text-sky-400 uppercase tracking-wider">Scanner Kamera Aktif</h3>
                <button onclick="stopScanner()" class="text-slate-400 hover:text-rose-400"><i data-lucide="x"></i></button>
            </div>
            <div id="interactive-reader" class="w-full overflow-hidden rounded-2xl bg-slate-900 border border-slate-800"></div>
        </div>
    </div>

    <!-- App Root -->
    <div id="app-root" class="h-full w-full flex flex-col"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDpQE3wu3v0EWyrcosBhZwR8rArNSNrikw",
            authDomain: "aa-stock.firebaseapp.com",
            projectId: "aa-stock",
            storageBucket: "aa-stock.firebasestorage.app",
            messagingSenderId: "143973644444",
            appId: "1:143973644444:web:13fe67ef88896a1fd2d559"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const docRef = doc(db, "inventori", "data_pusat");

        const dictionary = {
            ms: { dashboard: "Papan Pemuka", products: "Urus Produk", categories: "Kategori", suppliers: "Pembekal", stockIn: "Stok Masuk", stockOut: "Stok Keluar", users: "Kakitangan", reports: "Laporan Baki", search: "Cari produk/SKU...", cost: "Kos Modal", price: "Harga Jual", asset: "Nilai Aset", currentStock: "Baki Semasa", save: "Simpan Rekod", action: "Tindakan" },
            id: { dashboard: "Dashboard", products: "Kelola Produk", categories: "Kategori Menu", suppliers: "Daftar Supplier", stockIn: "Input Stok Masuk", stockOut: "Input Stok Keluar", users: "Manajemen Tim", reports: "Laporan Stok", search: "Cari nama/SKU...", cost: "Harga Modal", price: "Harga Jual", asset: "Total Aset", currentStock: "Stok Fisik", save: "Simpan ke Cloud", action: "Aksi" },
            en: { dashboard: "Analytics Console", products: "Inventory Nodes", categories: "Categories", suppliers: "Suppliers Hub", stockIn: "Inbound Flow", stockOut: "Outbound Flow", users: "Staff Access", reports: "Ledger Sheets", search: "Query matrix...", cost: "Unit Cost", price: "Retail Price", asset: "Asset Value", currentStock: "In-Stock", save: "Commit Changes", action: "Control" }
        };

        let state = { users: [], products: [], categories: [], suppliers: [], stockIn: [], stockOut: [], currentUser: null, activeView: 'dashboard', currentLang: 'id', searchQuery: '' };
        let charts = {};
        let html5QrcodeScanner = null;

        onSnapshot(docRef, (docSnap) => {
            if (docSnap.exists()) {
                const d = docSnap.data();
                state.users = d.users || [];
                state.products = d.products || [];
                state.categories = d.categories || [];
                state.suppliers = d.suppliers || [];
                state.stockIn = d.stockIn || [];
                state.stockOut = d.stockOut || [];
            }
            renderApp();
        });

        async function syncCloud() {
            await setDoc(docRef, { users: state.users, products: state.products, categories: state.categories, suppliers: state.suppliers, stockIn: state.stockIn, stockOut: state.stockOut }, { merge: true });
        }

        window.setLang = (lang) => { state.currentLang = lang; renderApp(); };
        window.navigate = (view) => { state.activeView = view; state.searchQuery = ''; renderApp(); };
        window.logout = () => { state.currentUser = null; renderApp(); };
        window.updateSearch = (val) => { state.searchQuery = val.toLowerCase(); filterTable(); };

        window.showToast = (title, message, type = 'success') => {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `p-4 rounded-2xl glass-card flex gap-3 shadow-2xl animate-fade border-l-4 ${type==='error'?'border-l-rose-500':'border-l-sky-500'}`;
            toast.innerHTML = `<div><h4 class="text-xs font-bold text-white">${title}</h4><p class="text-[11px] text-slate-400 mt-0.5">${message}</p></div>`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3500);
        };

        window.askConfirmation = (title, desc, onConfirm) => {
            const modal = document.getElementById('confirm-modal');
            document.getElementById('confirm-title').textContent = title;
            document.getElementById('confirm-desc').textContent = desc;
            modal.classList.remove('hidden');
            document.getElementById('confirm-btn-cancel').onclick = () => modal.classList.add('hidden');
            document.getElementById('confirm-btn-confirm').onclick = () => { modal.classList.add('hidden'); onConfirm(); };
        };

        // --- SISTEM AUTENTIKASI MULTI-USER ---
        window.handleAuth = (e) => {
            e.preventDefault();
            const u = document.getElementById('auth-user').value;
            const p = document.getElementById('auth-pass').value;
            const match = state.users.find(user => user.username === u && user.password === p);
            
            if(match) {
                state.currentUser = match;
                state.activeView = 'dashboard';
                renderApp();
                showToast('Otentikasi Berhasil', `Selamat datang kembali, ${match.name}`);
            } else {
                showToast('Akses Ditolak', 'Username atau Password salah.', 'error');
            }
        };

        window.handleInitialAdmin = async (e) => {
            e.preventDefault();
            const adminData = { id: 'u_'+Date.now(), name: document.getElementById('init-name').value, username: document.getElementById('init-user').value, password: document.getElementById('init-pass').value, role: 'Admin' };
            state.users.push(adminData);
            state.currentUser = adminData;
            await syncCloud();
            renderApp();
        };

        // --- MANAJEMEN CRUD (TAMBAH, EDIT, HAPUS) ---
        window.saveProduct = async (e) => {
            e.preventDefault();
            const id = document.getElementById('p-id').value || 'p_' + Date.now();
            const productData = {
                id, sku: document.getElementById('p-sku').value, name: document.getElementById('p-name').value,
                category: document.getElementById('p-cat').value, supplier: document.getElementById('p-sup').value,
                currentStock: Number(document.getElementById('p-curr').value), minStock: 2, unit: 'Pcs',
                cost: Number(document.getElementById('p-cost').value || 0), price: Number(document.getElementById('p-price').value || 0)
            };
            const idx = state.products.findIndex(p => p.id === id);
            if(idx > -1) state.products[idx] = productData; else state.products.push(productData);
            await syncCloud(); showToast('Berhasil', 'Katalog master terwujud.'); navigate('products');
        };

        window.editProduct = (id) => {
            const p = state.products.find(prod => prod.id === id);
            if(p) {
                document.getElementById('p-id').value = p.id;
                document.getElementById('p-sku').value = p.sku;
                document.getElementById('p-name').value = p.name;
                document.getElementById('p-cat').value = p.category;
                document.getElementById('p-sup').value = p.supplier;
                document.getElementById('p-cost').value = p.cost;
                document.getElementById('p-price').value = p.price;
                document.getElementById('p-curr').value = p.currentStock;
            }
        };

        window.deleteData = (type, id) => {
            askConfirmation('Hapus Data Permanen?', 'Tindakan ini tidak bisa dibatalkan dari sistem cloud.', async () => {
                state[type] = state[type].filter(item => item.id !== id);
                await syncCloud();
                showToast('Terhapus', 'Data berhasil dibersihkan dari server pusat.');
                renderApp();
            });
        };

        window.saveCategory = async (e) => {
            e.preventDefault();
            state.categories.push({ id: 'c_'+Date.now(), name: document.getElementById('c-name').value });
            await syncCloud(); document.getElementById('c-form').reset(); renderApp();
        };

        window.saveSupplier = async (e) => {
            e.preventDefault();
            state.suppliers.push({ id: 's_'+Date.now(), name: document.getElementById('s-name').value, contact: document.getElementById('s-contact').value });
            await syncCloud(); document.getElementById('s-form').reset(); renderApp();
        };

        window.saveUser = async (e) => {
            e.preventDefault();
            state.users.push({ id: 'u_'+Date.now(), name: document.getElementById('u-name').value, username: document.getElementById('u-user').value, password: document.getElementById('u-pass').value, role: document.getElementById('u-role').value });
            await syncCloud(); document.getElementById('u-form').reset(); renderApp();
        };

        window.handleStockTx = async (e, type) => {
            e.preventDefault();
            const pid = document.getElementById(`tx-p-${type}`).value;
            const qty = Number(document.getElementById(`tx-q-${type}`).value);
            const p = state.products.find(prod => prod.id === pid);
            if(!p) return;

            if(type === 'out' && p.currentStock < qty) {
                showToast('Gagal', 'Stok fisik gudang tidak mencukupi.', 'error');
                return;
            }

            p.currentStock += (type === 'in' ? qty : -qty);
            state[type === 'in' ? 'stockIn' : 'stockOut'].push({ id: 't_'+Date.now(), product: p.name, qty, date: new Date().toLocaleDateString(), operator: state.currentUser.name });
            await syncCloud(); showToast('Transaksi Sukses', 'Arus inventori diperbarui.'); navigate('dashboard');
        };

        window.startScanner = (targetId) => {
            document.getElementById('scanner-modal').classList.remove('hidden');
            html5QrcodeScanner = new Html5Qrcode("interactive-reader");
            html5QrcodeScanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 230 }, (text) => {
                document.getElementById(targetId).value = text;
                stopScanner();
            }, () => {});
        };

        window.stopScanner = () => { if(html5QrcodeScanner) html5QrcodeScanner.stop().then(() => document.getElementById('scanner-modal').classList.add('hidden')); };

        function txt(key) { return dictionary[state.currentLang][key] || key; }

        function filterTable() {
            document.querySelectorAll('.data-row').forEach(row => {
                row.style.display = row.getAttribute('data-filter').includes(state.searchQuery) ? '' : 'none';
            });
        }

        function renderApp() {
            const root = document.getElementById('app-root');
            if(!root) return;

            // SCENARIO 1: Server Kosong Baru Pertama Kali Setup
            if(state.users.length === 0) {
                root.innerHTML = `
                    <div class="min-h-screen flex items-center justify-center p-4">
                        <div class="glass-card max-w-md w-full p-8 rounded-3xl border border-slate-800">
                            <h2 class="text-lg font-extrabold text-white">Inisialisasi Master Titan</h2>
                            <p class="text-xs text-slate-400 mt-1">Buat akun Root Administrator utama Anda.</p>
                            <form onsubmit="handleInitialAdmin(event)" class="space-y-4 mt-6">
                                <div><label class="text-[10px] uppercase font-bold text-slate-400 block mb-1">Nama Lengkap</label><input type="text" id="init-name" required class="w-full bg-slate-900 border border-slate-700 p-3 rounded-xl text-xs text-white outline-none"></div>
                                <div><label class="text-[10px] uppercase font-bold text-slate-400 block mb-1">Username</label><input type="text" id="init-user" required class="w-full bg-slate-900 border border-slate-700 p-3 rounded-xl text-xs text-white outline-none"></div>
                                <div><label class="text-[10px] uppercase font-bold text-slate-400 block mb-1">Secure Password</label><input type="password" id="init-pass" required class="w-full bg-slate-900 border border-slate-700 p-3 rounded-xl text-xs text-white outline-none"></div>
                                <button type="submit" class="w-full bg-sky-500 hover:bg-sky-600 text-white py-3 rounded-xl font-bold text-xs mt-2 transition">Deploy Environment</button>
                            </form>
                        </div>
                    </div>`;
                return;
            }

            // SCENARIO 2: Landing Page Screen (Pilih Bahasa & Login)
            if(!state.currentUser) {
                root.innerHTML = `
                    <div class="min-h-screen flex flex-col items-center justify-center p-4">
                        <div class="glass-card max-w-sm w-full p-8 rounded-3xl text-center border border-slate-800">
                            <div class="flex justify-center gap-2 mb-6 bg-slate-900 p-1 rounded-xl w-fit mx-auto border border-slate-800">
                                <button onclick="setLang('ms')" class="px-3 py-1 rounded-lg text-[10px] font-bold ${state.currentLang==='ms'?'bg-sky-500 text-white':'text-slate-400'}">MALAYU</button>
                                <button onclick="setLang('id')" class="px-3 py-1 rounded-lg text-[10px] font-bold ${state.currentLang==='id'?'bg-sky-500 text-white':'text-slate-400'}">INDONESIA</button>
                                <button onclick="setLang('en')" class="px-3 py-1 rounded-lg text-[10px] font-bold ${state.currentLang==='en'?'bg-sky-500 text-white':'text-slate-400'}">ENGLISH</button>
                            </div>
                            <h1 class="text-2xl font-black text-white tracking-tight">AA STOCK <span class="text-sky-400">TITAN</span></h1>
                            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1">Cloud Core System</p>
                            
                            <form onsubmit="handleAuth(event)" class="space-y-4 text-left mt-6">
                                <div><label class="text-[10px] font-bold text-slate-400 block mb-1 uppercase">Identitas Akun</label><input type="text" id="auth-user" required class="w-full bg-slate-900/80 border border-slate-700 p-3 rounded-xl text-xs text-white outline-none focus:border-sky-500"></div>
                                <div><label class="text-[10px] font-bold text-slate-400 block mb-1 uppercase">Secure Passkey</label><input type="password" id="auth-pass" required class="w-full bg-slate-900/80 border border-slate-700 p-3 rounded-xl text-xs text-white outline-none focus:border-sky-500"></div>
                                <button type="submit" class="w-full bg-gradient-to-r from-sky-500 to-indigo-600 text-white py-3 rounded-xl font-bold text-xs tracking-wide shadow-lg shadow-sky-500/10 mt-2">Masuk Sistem</button>
                            </form>
                        </div>
                    </div>`;
                return;
            }

            // SCENARIO 3: Main Dashboard Interface
            const isAdmin = state.currentUser.role === 'Admin';
            const totalAssets = state.products.reduce((acc, p) => acc + ((p.cost || 0) * p.currentStock), 0);

            root.className = "flex flex-col md:flex-row h-full w-full overflow-hidden bg-slate-950";
            root.innerHTML = `
                <!-- Sidebar Navigasi -->
                <div class="hidden md:flex w-64 flex-col shrink-0 no-print border-r border-slate-800/80 bg-slate-950">
                    <div class="p-6 border-b border-slate-900 flex items-center gap-3">
                        <div class="w-8 h-8 rounded-xl bg-gradient-to-tr from-sky-500 to-indigo-500 flex items-center justify-center font-black text-white text-xs">AA</div>
                        <div><h2 class="font-bold text-white text-xs tracking-tight">AA TITAN CORE</h2><p class="text-[9px] text-sky-400 font-mono">v5.0-SECURE</p></div>
                    </div>
                    <div class="flex-1 overflow-y-auto px-4 py-4 space-y-1 no-scrollbar">
                        <button onclick="navigate('dashboard')" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl font-semibold text-xs text-left ${state.activeView==='dashboard'?'bg-sky-500 text-white':'text-slate-400 hover:bg-slate-900'}"><i data-lucide="layout-grid" class="w-4 h-4"></i>${txt('dashboard')}</button>
                        <button onclick="navigate('products')" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl font-semibold text-xs text-left ${state.activeView==='products'?'bg-sky-500 text-white':'text-slate-400 hover:bg-slate-900'}"><i data-lucide="package" class="w-4 h-4"></i>${txt('products')}</button>
                        
                        ${isAdmin ? `
                        <button onclick="navigate('categories')" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl font-semibold text-xs text-left ${state.activeView==='categories'?'bg-sky-500 text-white':'text-slate-400 hover:bg-slate-900'}"><i data-lucide="tag" class="w-4 h-4"></i>${txt('categories')}</button>
                        <button onclick="navigate('suppliers')" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl font-semibold text-xs text-left ${state.activeView==='suppliers'?'bg-sky-500 text-white':'text-slate-400 hover:bg-slate-900'}"><i data-lucide="truck" class="w-4 h-4"></i>${txt('suppliers')}</button>
                        <button onclick="navigate('users')" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl font-semibold text-xs text-left ${state.activeView==='users'?'bg-sky-500 text-white':'text-slate-400 hover:bg-slate-900'}"><i data-lucide="users" class="w-4 h-4"></i>${txt('users')}</button>
                        ` : ''}

                        <button onclick="navigate('stock-in')" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl font-semibold text-xs text-left ${state.activeView==='stock-in'?'bg-sky-500 text-white':'text-slate-400 hover:bg-slate-900'}"><i data-lucide="arrow-down-left" class="w-4 h-4 text-emerald-400"></i>${txt('stockIn')}</button>
                        <button onclick="navigate('stock-out')" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl font-semibold text-xs text-left ${state.activeView==='stock-out'?'bg-sky-500 text-white':'text-slate-400 hover:bg-slate-900'}"><i data-lucide="arrow-up-right" class="w-4 h-4 text-rose-400"></i>${txt('stockOut')}</button>
                        <button onclick="navigate('reports')" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl font-semibold text-xs text-left ${state.activeView==='reports'?'bg-sky-500 text-white':'text-slate-400 hover:bg-slate-900'}"><i data-lucide="file-text" class="w-4 h-4"></i>${txt('reports')}</button>
                    </div>
                    <div class="p-4 border-t border-slate-900 flex items-center justify-between bg-slate-900/50">
                        <div class="truncate">
                            <h4 class="text-xs font-bold text-white">${state.currentUser.name}</h4>
                            <span class="text-[9px] font-mono font-bold text-sky-400 uppercase tracking-widest bg-sky-500/10 px-1.5 py-0.5 rounded">${state.currentUser.role}</span>
                        </div>
                        <button onclick="logout()" class="p-2 text-slate-500 hover:text-rose-400 transition"><i data-lucide="log-out" class="w-4 h-4"></i></button>
                    </div>
                </div>

                <!-- Konten Utama Workstation -->
                <div class="flex-1 flex flex-col min-w-0 overflow-y-auto pb-20 md:pb-0">
                    <header class="border-b border-slate-900 h-16 px-4 md:px-8 flex items-center justify-between no-print sticky top-0 z-30 shrink-0 bg-slate-950/80 backdrop-blur-md">
                        <h2 class="font-extrabold text-white text-xs uppercase tracking-wider">${txt(state.activeView)}</h2>
                    </header>
                    <main class="flex-1 p-4 md:p-8 animate-fade">${renderCoreViews(totalAssets, isAdmin)}</main>
                </div>

                <!-- Navigasi Bawah Mobile -->
                <div class="md:hidden fixed bottom-0 left-0 right-0 h-16 bg-slate-900 border-t border-slate-800 flex items-center justify-around px-2 z-40 no-print">
                    <button onclick="navigate('dashboard')" class="flex flex-col items-center justify-center text-center gap-1 ${state.activeView==='dashboard'?'text-sky-400':'text-slate-500'}"><i data-lucide="layout-grid" class="w-4 h-4"></i><span class="text-[9px]">Dash</span></button>
                    <button onclick="navigate('products')" class="flex flex-col items-center justify-center text-center gap-1 ${state.activeView==='products'?'text-sky-400':'text-slate-500'}"><i data-lucide="package" class="w-4 h-4"></i><span class="text-[9px]">Stok</span></button>
                    <button onclick="navigate('stock-in')" class="flex flex-col items-center justify-center text-center gap-1 ${state.activeView==='stock-in'?'text-sky-400':'text-slate-500'}"><i data-lucide="arrow-down-left" class="w-4 h-4"></i><span class="text-[9px]">In</span></button>
                    <button onclick="navigate('stock-out')" class="flex flex-col items-center justify-center text-center gap-1 ${state.activeView==='stock-out'?'text-sky-400':'text-slate-500'}"><i data-lucide="arrow-up-right" class="w-4 h-4"></i><span class="text-[9px]">Out</span></button>
                    <button onclick="navigate('reports')" class="flex flex-col items-center justify-center text-center gap-1 ${state.activeView==='reports'?'text-sky-400':'text-slate-500'}"><i data-lucide="file-text" class="w-4 h-4"></i><span class="text-[9px]">Cetak</span></button>
                </div>
            `;
            lucide.createIcons();
            initCharts();
        }

        function renderCoreViews(totalAssets, isAdmin) {
            if(state.activeView === 'dashboard') {
                return `
                    <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
                        <div class="glass-card p-5 rounded-2xl"><span class="text-[10px] text-slate-400 font-bold block uppercase">Item SKU</span><span class="text-xl font-black text-white mt-1 block">${state.products.length}</span></div>
                        <div class="glass-card p-5 rounded-2xl"><span class="text-[10px] text-slate-400 font-bold block uppercase">Kuantitas Fisik</span><span class="text-xl font-black text-sky-400 mt-1 block">${state.products.reduce((a,b)=>a+Number(b.currentStock),0)} Pcs</span></div>
                        <div class="glass-card p-5 rounded-2xl col-span-2"><span class="text-[10px] text-emerald-400 font-bold block uppercase">${txt('asset')}</span><span class="text-xl font-black text-emerald-400 mt-1 block">Rp ${totalAssets.toLocaleString('id-ID')}</span></div>
                    </div>
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <div class="glass-card p-6 rounded-3xl"><h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">Volume Penyeimbangan</h3><div class="h-64"><canvas id="c-vol"></canvas></div></div>
                        <div class="glass-card p-6 rounded-3xl"><h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">Grafik Transaksi Arus</h3><div class="h-64"><canvas id="c-trend"></canvas></div></div>
                    </div>`;
            }
            if(state.activeView === 'products') {
                return `
                    <div class="grid grid-cols-1 xl:grid-cols-3 gap-6">
                        <div class="xl:col-span-2 glass-card rounded-3xl overflow-hidden flex flex-col">
                            <div class="p-4 border-b border-slate-800 bg-slate-900/40 flex items-center">
                                <div class="relative flex-1">
                                    <i data-lucide="search" class="w-4 h-4 text-slate-500 absolute left-3 top-3"></i>
                                    <input type="text" oninput="updateSearch(this.value)" placeholder="${txt('search')}" class="w-full bg-slate-950 pl-9 pr-4 py-2 border border-slate-800 rounded-xl text-xs text-white outline-none focus:border-sky-500">
                                </div>
                            </div>
                            <div class="overflow-x-auto"><table class="w-full text-left text-xs"><thead><tr class="bg-slate-900/50 text-slate-400 font-bold border-b border-slate-800 uppercase text-[9px] tracking-wider"><th class="p-4">SKU</th><th class="p-4">Produk</th><th class="p-4">Modal</th><th class="p-4">Jual</th><th class="p-4">Stok</th><th class="p-4 text-center">${txt('action')}</th></tr></thead><tbody class="divide-y divide-slate-800/60">
                                ${state.products.length===0?'<tr><td colspan="6" class="p-8 text-center text-slate-500">Gudang kosong. Mulai input katalog.</td></tr>':state.products.map(p=>`
                                    <tr class="data-row hover:bg-slate-900/30 transition" data-filter="${p.sku.toLowerCase()} ${p.name.toLowerCase()}">
                                        <td class="p-4 font-mono text-slate-400">${p.sku}</td>
                                        <td class="p-4 font-bold text-white">${p.name}</td>
                                        <td class="p-4 font-mono text-slate-400">Rp ${p.cost?.toLocaleString('id-ID')}</td>
                                        <td class="p-4 font-mono text-sky-400 font-bold">Rp ${p.price?.toLocaleString('id-ID')}</td>
                                        <td class="p-4 font-black text-slate-200">${p.currentStock} ${p.unit}</td>
                                        <td class="p-4 flex justify-center gap-2">
                                            <button onclick="editProduct('${p.id}')" class="p-1.5 bg-slate-800 rounded-lg text-slate-300 hover:bg-sky-500 hover:text-white transition"><i data-lucide="edit-3" class="w-3.5 h-3.5"></i></button>
                                            ${isAdmin ? `<button onclick="deleteData('products', '${p.id}')" class="p-1.5 bg-slate-800 rounded-lg text-rose-400 hover:bg-rose-600 hover:text-white transition"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i></button>` : ''}
                                        </td>
                                    </tr>`).join('')}
                            </tbody></table></div>
                        </div>
                        <div class="glass-card p-6 rounded-3xl h-fit">
                            <h3 class="font-bold text-white mb-4 text-xs uppercase tracking-wide">Katalog Master Core</h3>
                            <form onsubmit="saveProduct(event)" class="space-y-3">
                                <input type="hidden" id="p-id">
                                <div><label class="block text-[9px] font-bold text-slate-400 mb-1 uppercase">SKU Barcode</label>
                                    <div class="flex gap-2"><input type="text" id="p-sku" required class="flex-1 bg-slate-950 border border-slate-800 p-2.5 rounded-xl text-xs text-white outline-none"><button type="button" onclick="startScanner('p-sku')" class="px-3 bg-slate-800 border border-slate-700 text-white rounded-xl"><i data-lucide="scan" class="w-4 h-4"></i></button></div>
                                </div>
                                <div><label class="block text-[9px] font-bold text-slate-400 mb-1 uppercase">Nama Barang *</label><input type="text" id="p-name" required class="w-full bg-slate-950 border border-slate-800 p-2.5 rounded-xl text-xs text-white outline-none"></div>
                                <div class="grid grid-cols-2 gap-3">
                                    <div><label class="block text-[9px] font-bold text-slate-400 mb-1 uppercase">Kategori</label><select id="p-cat" class="w-full bg-slate-950 border border-slate-800 p-2.5 rounded-xl text-xs text-white">${state.categories.map(c=>`<option value="${c.name}">${c.name}</option>`).join('')}<option value="">Umum</option></select></div>
                                    <div><label class="block text-[9px] font-bold text-slate-400 mb-1 uppercase">Supplier</label><select id="p-sup" class="w-full bg-slate-950 border border-slate-800 p-2.5 rounded-xl text-xs text-white">${state.suppliers.map(s=>`<option value="${s.name}">${s.name}</option>`).join('')}<option value="">Umum</option></select></div>
                                </div>
                                <div class="grid grid-cols-2 gap-3">
                                    <div><label class="block text-[9px] font-bold text-slate-400 mb-1 uppercase">Harga Modal</label><input type="number" id="p-cost" required class="w-full bg-slate-950 border border-slate-800 p-2.5 rounded-xl text-xs text-white outline-none"></div>
                                    <div><label class="block text-[9px] font-bold text-slate-400 mb-1 uppercase">Harga Jual</label><input type="number" id="p-price" required class="w-full bg-slate-950 border border-slate-800 p-2.5 rounded-xl text-xs text-white outline-none"></div>
                                </div>
                                <div><label class="block text-[9px] font-bold text-slate-400 mb-1 uppercase">Baki/Stok Awal</label><input type="number" id="p-curr" value="0" class="w-full bg-slate-950 border border-slate-800 p-2.5 rounded-xl text-xs text-white outline-none"></div>
                                <button type="submit" class="w-full bg-sky-500 hover:bg-sky-600 text-slate-950 p-3 rounded-xl font-bold text-xs tracking-wide transition mt-2">${txt('save')}</button>
                            </form>
                        </div>
                    </div>`;
            }
            if(state.activeView === 'categories' && isAdmin) {
                return `
                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        <div class="glass-card p-6 rounded-3xl h-fit">
                            <h3 class="font-bold text-white mb-4 text-xs uppercase">Cipta Kategori</h3>
                            <form id="c-form" onsubmit="saveCategory(event)" class="space-y-4">
                                <div><label class="text-[10px] font-bold text-slate-400 block mb-1">Nama Kategori *</label><input type="text" id="c-name" required class="w-full bg-slate-950 border border-slate-800 p-2.5 rounded-xl text-xs text-white outline-none"></div>
                                <button type="submit" class="w-full bg-sky-500 text-slate-950 p-2.5 rounded-xl font-bold text-xs">Simpan</button>
                            </form>
                        </div>
                        <div class="lg:col-span-2 glass-card rounded-3xl overflow-hidden">
                            <table class="w-full text-left text-xs"><thead><tr class="bg-slate-900 border-b border-slate-800 p-3 font-bold text-slate-400 uppercase text-[9px]"><th class="p-4">Nama Kategori</th><th class="p-4 text-center">Tindakan</th></tr></thead><tbody class="divide-y divide-slate-800">${state.categories.map(c=>`<tr><td class="p-4 font-bold text-white">${c.name}</td><td class="p-4 text-center"><button onclick="deleteData('categories', '${c.id}')" class="text-rose-400 hover:text-rose-500"><i data-lucide="trash-2" class="w-4 h-4 mx-auto"></i></button></td></tr>`).join('')}</tbody></table>
                        </div>
                    </div>`;
            }
            if(state.activeView === 'suppliers' && isAdmin) {
                return `
                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        <div class="glass-card p-6 rounded-3xl h-fit">
                            <h3 class="font-bold text-white mb-4 text-xs uppercase">Daftar Pembekal</h3>
                            <form id="s-form" onsubmit="saveSupplier(event)" class="space-y-4">
                                <div><label class="text-[10px] font-bold text-slate-400 block mb-1">Nama Pembekal *</label><input type="text" id="s-name" required class="w-full bg-slate-950 border border-slate-800 p-2.5 rounded-xl text-xs text-white outline-none"></div>
                                <div><label class="text-[10px] font-bold text-slate-400 block mb-1">Kontak Telefon</label><input type="text" id="s-contact" class="w-full bg-slate-950 border border-slate-800 p-2.5 rounded-xl text-xs text-white outline-none"></div>
                                <button type="submit" class="w-full bg-sky-500 text-slate-950 p-2.5 rounded-xl font-bold text-xs">Daftar</button>
                            </form>
                        </div>
                        <div class="lg:col-span-2 glass-card rounded-3xl overflow-hidden">
                            <table class="w-full text-left text-xs"><thead><tr class="bg-slate-900 border-b border-slate-800 p-3 font-bold text-slate-400 uppercase text-[9px]"><th class="p-4">Pembekal</th><th class="p-4">Hubungan</th><th class="p-4 text-center">Tindakan</th></tr></thead><tbody class="divide-y divide-slate-800">${state.suppliers.map(s=>`<tr><td class="p-4 font-bold text-white">${s.name}</td><td class="p-4 font-mono text-slate-400">${s.contact||'-'}</td><td class="p-4 text-center"><button onclick="deleteData('suppliers', '${s.id}')" class="text-rose-400 hover:text-rose-500"><i data-lucide="trash-2" class="w-4 h-4 mx-auto"></i></button></td></tr>`).join('')}</tbody></table>
                        </div>
                    </div>`;
            }
            if(state.activeView === 'users' && isAdmin) {
                return `
                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        <div class="glass-card p-6 rounded-3xl h-fit">
                            <h3 class="font-bold text-white mb-4 text-xs uppercase">Akaun Kakitangan</h3>
                            <form id="u-form" onsubmit="saveUser(event)" class="space-y-3">
                                <div><label class="text-[10px] font-bold text-slate-400 block mb-1">Nama</label><input type="text" id="u-name" required class="w-full bg-slate-950 border border-slate-800 p-2 rounded-xl text-xs text-white outline-none"></div>
                                <div><label class="text-[10px] font-bold text-slate-400 block mb-1">Username Sistem</label><input type="text" id="u-user" required class="w-full bg-slate-950 border border-slate-800 p-2 rounded-xl text-xs text-white outline-none"></div>
                                <div><label class="text-[10px] font-bold text-slate-400 block mb-1">Password</label><input type="password" id="u-pass" required class="w-full bg-slate-950 border border-slate-800 p-2 rounded-xl text-xs text-white outline-none"></div>
                                <div><label class="text-[10px] font-bold text-slate-400 block mb-1">Peranan</label><select id="u-role" class="w-full bg-slate-950 border border-slate-800 p-2 rounded-xl text-xs text-white"><option value="Staff">Staff</option><option value="Admin">Admin</option></select></div>
                                <button type="submit" class="w-full bg-sky-500 text-slate-950 py-2 rounded-xl font-bold text-xs mt-2">Aktifkan Akaun</button>
                            </form>
                        </div>
                        <div class="lg:col-span-2 glass-card rounded-3xl overflow-hidden">
                            <table class="w-full text-left text-xs"><thead><tr class="bg-slate-900 border-b border-slate-800 p-3 font-bold text-slate-400 uppercase text-[9px]"><th class="p-4">Nama</th><th class="p-4">Username</th><th class="p-4">Role</th><th class="p-4 text-center">Tindakan</th></tr></thead><tbody class="divide-y divide-slate-800">${state.users.map(u=>`<tr><td class="p-4 font-bold text-white">${u.name}</td><td class="p-4 font-mono text-slate-400">${u.username}</td><td class="p-4"><span class="bg-slate-800 text-sky-400 px-2 py-0.5 rounded text-[10px] font-bold">${u.role}</span></td><td class="p-4 text-center">${u.role !== 'Admin' ? `<button onclick="deleteData('users', '${u.id}')" class="text-rose-400 hover:text-rose-500"><i data-lucide="trash-2" class="w-4 h-4 mx-auto"></i></button>` : '-'}</td></tr>`).join('')}</tbody></table>
                        </div>
                    </div>`;
            }
            if(state.activeView === 'stock-in') {
                return `
                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        <div class="glass-card p-6 rounded-3xl h-fit">
                            <h3 class="font-bold text-emerald-400 mb-4 flex items-center gap-2 text-xs uppercase"><i data-lucide="plus-circle" class="w-4 h-4"></i>Stok Masuk</h3>
                            <form onsubmit="handleStockTx(event, 'in')" class="space-y-4">
                                <div><label class="text-[10px] font-bold text-slate-400 block mb-1">Pilih Barang *</label><select id="tx-p-in" required class="w-full bg-slate-950 border border-slate-800 p-2.5 rounded-xl text-xs text-white">${state.products.map(p=>`<option value="${p.id}">${p.name} (Baki: ${p.currentStock})</option>`).join('')}</select></div>
                                <div><label class="text-[10px] font-bold text-slate-400 block mb-1">Volume Kuantitas *</label><input type="number" id="tx-q-in" min="1" required class="w-full bg-slate-950 border border-slate-800 p-2.5 rounded-xl text-xs text-white outline-none"></div>
                                <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white p-3 rounded-xl font-bold text-xs">Commit Inbound</button>
                            </form>
                        </div>
                        <div class="lg:col-span-2 glass-card rounded-3xl overflow-hidden">
                            <table class="w-full text-left text-xs"><thead><tr class="bg-slate-900 border-b border-slate-800 text-[9px] text-slate-400 uppercase"><th class="p-3">Masa</th><th class="p-3">Item</th><th class="p-3">Operator</th><th class="p-3 text-right">Kuantitas</th></tr></thead><tbody class="divide-y divide-slate-800">${state.stockIn.slice().reverse().map(l=>`<tr><td class="p-3 text-slate-400 font-mono">${l.date}</td><td class="p-3 font-bold text-white">${l.product}</td><td class="p-3 text-slate-400">${l.operator||'Sistem'}</td><td class="p-3 text-right font-bold text-emerald-400">+ ${l.qty}</td></tr>`).join('')}</tbody></table>
                        </div>
                    </div>`;
            }
            if(state.activeView === 'stock-out') {
                return `
                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        <div class="glass-card p-6 rounded-3xl h-fit">
                            <h3 class="font-bold text-rose-400 mb-4 flex items-center gap-2 text-xs uppercase"><i data-lucide="minus-circle" class="w-4 h-4"></i>Stok Keluar</h3>
                            <form onsubmit="handleStockTx(event, 'out')" class="space-y-4">
                                <div><label class="text-[10px] font-bold text-slate-400 block mb-1">Pilih Barang *</label><select id="tx-p-out" required class="w-full bg-slate-950 border border-slate-800 p-2.5 rounded-xl text-xs text-white">${state.products.map(p=>`<option value="${p.id}">${p.name} (Baki: ${p.currentStock})</option>`).join('')}</select></div>
                                <div><label class="text-[10px] font-bold text-slate-400 block mb-1">Volume Kuantitas *</label><input type="number" id="tx-q-out" min="1" required class="w-full bg-slate-950 border border-slate-800 p-2.5 rounded-xl text-xs text-white outline-none"></div>
                                <button type="submit" class="w-full bg-rose-600 hover:bg-rose-700 text-white p-3 rounded-xl font-bold text-xs">Commit Outbound</button>
                            </form>
                        </div>
                        <div class="lg:col-span-2 glass-card rounded-3xl overflow-hidden">
                            <table class="w-full text-left text-xs"><thead><tr class="bg-slate-900 border-b border-slate-800 text-[9px] text-slate-400 uppercase"><th class="p-3">Masa</th><th class="p-3">Item</th><th class="p-3">Operator</th><th class="p-3 text-right">Kuantitas</th></tr></thead><tbody class="divide-y divide-slate-800">${state.stockOut.slice().reverse().map(l=>`<tr><td class="p-3 text-slate-400 font-mono">${l.date}</td><td class="p-3 font-bold text-white">${l.product}</td><td class="p-3 text-slate-400">${l.operator||'Sistem'}</td><td class="p-3 text-right font-bold text-rose-400">- ${l.qty}</td></tr>`).join('')}</tbody></table>
                        </div>
                    </div>`;
            }
            if(state.activeView === 'reports') {
                return `
                    <div class="glass-card p-6 md:p-8 rounded-3xl print-area">
                        <div class="flex justify-between items-start border-b border-slate-800 pb-6 mb-6">
                            <div><h2 class="text-lg font-black text-white">AA STOCK TITAN MASTER REPORT</h2><p class="text-[10px] text-slate-400 font-mono uppercase mt-0.5">Secure Global Inventory Ledger Statement</p></div>
                            <div class="flex gap-2 no-print"><button onclick="window.print()" class="bg-white text-slate-950 px-4 py-2 rounded-xl font-bold text-xs flex items-center gap-2"><i data-lucide="printer" class="w-3.5 h-3.5"></i> Cetak Dokumen PDF</button></div>
                        </div>
                        <table class="w-full text-left text-xs border-collapse">
                            <thead><tr class="bg-slate-900 text-slate-400 font-bold border-b border-slate-800 uppercase text-[9px]"><th class="p-3">SKU</th><th class="p-3">Nama Produk</th><th class="p-3">Valuasi Aset</th><th class="p-3 text-right">Stok Fisik</th></tr></thead>
                            <tbody class="divide-y divide-slate-800/80">${state.products.map(p=>`<tr><td class="p-3 font-mono text-slate-400">${p.sku}</td><td class="p-3 font-bold text-white">${p.name}</td><td class="p-3 text-emerald-400 font-semibold">Rp ${((p.cost||0)*p.currentStock).toLocaleString('id-ID')}</td><td class="p-3 text-right font-black text-sky-400">${p.currentStock} ${p.unit}</td></tr>`).join('')}</tbody>
                        </table>
                    </div>`;
            }
        }

        function initCharts() {
            const el1 = document.getElementById('c-vol');
            if(el1) {
                if(charts.vol) charts.vol.destroy();
                charts.vol = new Chart(el1.getContext('2d'), {
                    type: 'bar',
                    data: { labels: state.products.map(p=>p.name), datasets: [{ label: 'Stok Barang', data: state.products.map(p=>p.currentStock), backgroundColor: '#0ea5e9', borderRadius: 4 }] },
                    options: { responsive: true, maintainAspectRatio: false, scales: { x: { grid: { display: false } }, y: { grid: { color: '#1e293b' } } } }
                });
            }
            const el2 = document.getElementById('c-trend');
            if(el2) {
                if(charts.trend) charts.trend.destroy();
                charts.trend = new Chart(el2.getContext('2d'), {
                    type: 'line',
                    data: { labels: ['Sesi 1', 'Sesi 2', 'Sesi 3', 'Kondisi Sekarang'], datasets: [{ label: 'Masuk', data: [2, 5, 3, state.stockIn.length], borderColor: '#10b981', fill: false }, { label: 'Keluar', data: [1, 4, 2, state.stockOut.length], borderColor: '#f43f5e', fill: false }] },
                    options: { responsive: true, maintainAspectRatio: false }
                });
            }
        }
    </script>
</body>
</html>
